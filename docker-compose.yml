services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - BASE_URL=http://localhost:8080
      - DATABASE_URL=postgres://shortener:shortener@postgres:5432/shortener?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_TTL=3600
      - CLICK_BUFFER_SIZE=1000
      - CLICK_FLUSH_INTERVAL=5
      - OG_SCRAPE_TIMEOUT=5
      - OG_SCRAPE_MAX_BODY=1048576
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me-to-a-strong-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_add_base_url.sql:/docker-entrypoint-initdb.d/002_add_base_url.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
